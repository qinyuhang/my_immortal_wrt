# OpenClash Local Main Config with Proxy Providers + SukkaW Rules + clash2 Groups

port: 7890
socks-port: 7891
redir-port: 7892
tproxy-port: 7895
mixed-port: 7893
external-controller: 0.0.0.0:9090
secret: "your-password-here"

mode: rule
log-level: info
ipv6: false
allow-lan: true
tcp-concurrent: true
enable-process: true
find-process-mode: strict
unified-delay: true

dns:
  enable: true
  listen: 0.0.0.0:7874
  ipv6: false
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 1.1.1.1
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - dhcp://system
    - https://dns.alidns.com/dns-query
  fallback:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 0.0.0.0/32
      - 100.64.0.0/10
      - 127.0.0.0/8
      - 240.0.0.0/4

# ========== Proxy Providers ==========
proxy-providers:
  Airport-A:
    type: http
    url: "https://your-subscription-url-1"
    path: ./proxy_providers/provider_a.yaml
    interval: 3600
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 300
      
  Airport-B:
    type: http
    url: "https://your-subscription-url-2"
    path: ./proxy_providers/provider_b.yaml
    interval: 3600
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 300

# ========== Rule Providers (SukkaW) ==========
rule-providers:
  reject-drop:
    type: http
    behavior: classical
    format: text
    url: "https://ruleset.skk.moe/List/non_ip/reject-drop.conf"
    path: ./rule_providers/reject-drop.yaml
    interval: 86400

  reject:
    type: http
    behavior: classical
    format: text
    url: "https://ruleset.skk.moe/List/non_ip/reject.conf"
    path: ./rule_providers/reject.yaml
    interval: 86400

  reject-no-drop:
    type: http
    behavior: classical
    format: text
    url: "https://ruleset.skk.moe/List/non_ip/reject-no-drop.conf"
    path: ./rule_providers/reject-no-drop.yaml
    interval: 86400

  reject-ip:
    type: http
    behavior: classical
    format: text
    url: "https://ruleset.skk.moe/List/ip/reject.conf"
    path: ./rule_providers/reject-ip.yaml
    interval: 86400

  reject-domain:
    type: http
    behavior: domain
    format: text
    url: "https://ruleset.skk.moe/List/domainset/reject.conf"
    path: ./rule_providers/reject-domain.yaml
    interval: 86400

  reject-domain-extra:
    type: http
    behavior: domain
    format: text
    url: "https://ruleset.skk.moe/List/domainset/reject_extra.conf"
    path: ./rule_providers/reject-domain-extra.yaml
    interval: 86400

# ========== Proxy Groups ==========
proxy-groups:
  - name: Manual
    type: select
    use:
      - Airport-A
      - Airport-B
    proxies:
      - DIRECT
      - REJECT

  - name: Auto
    type: url-test
    use:
      - Airport-A
      - Airport-B
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: HK
    type: url-test
    use:
      - Airport-A
      - Airport-B
    filter: "(?i)^(?!.*仅海外用户)(?!.*游戏).*(香港|HK|HongKong)"
    url: http://www.gstatic.com/generate_204
    interval: 300

  - name: TW
    type: url-test
    use:
      - Airport-A
      - Airport-B
    filter: "(?i)^(?!.*仅海外用户)(?!.*游戏).*(台湾|TW)"
    url: http://www.gstatic.com/generate_204
    interval: 300

  - name: SG
    type: url-test
    use:
      - Airport-A
      - Airport-B
    filter: "(?i)^(?!.*仅海外用户)(?!.*游戏).*(新加坡|SG|singapore)"
    url: http://www.gstatic.com/generate_204
    interval: 300

  - name: JP
    type: url-test
    use:
      - Airport-A
      - Airport-B
    filter: "(?i)^(?!.*仅海外用户)(?!.*游戏).*(日本|JP|Japan)"
    url: http://www.gstatic.com/generate_204
    interval: 300

  - name: US
    type: url-test
    use:
      - Airport-A
      - Airport-B
    filter: "(?i)^(?!.*仅海外用户)(?!.*游戏).*(美国|US)"
    url: http://www.gstatic.com/generate_204
    interval: 300

  - name: GamePlatform
