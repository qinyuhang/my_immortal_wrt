# OpenClash Local Main Config with Proxy Providers + SukkaW Rules
# Based on clash2 format

port: 7890
socks-port: 7891
redir-port: 7892
tproxy-port: 7895
mixed-port: 7893
external-controller: 0.0.0.0:9090
# external-ui disabled for docker test
secret: "your-password-here"

mode: rule
log-level: info
ipv6: false
allow-lan: true
tcp-concurrent: true
enable-process: true
find-process-mode: strict
unified-delay: true

dns:
  enable: true
  listen: 0.0.0.0:7874
  ipv6: false
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 1.1.1.1
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - dhcp://system
    - https://dns.alidns.com/dns-query
  fallback:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 0.0.0.0/32
      - 100.64.0.0/10
      - 127.0.0.0/8
      - 240.0.0.0/4

proxy-providers:
  Airport-A:
    type: http
    url: "https://your-subscription-url-1"
    path: ./proxy_providers/provider_a.yaml
    interval: 3600
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 300
      
  Airport-B:
    type: http
    url: "https://your-subscription-url-2"
    path: ./proxy_providers/provider_b.yaml
    interval: 3600
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 300

rule-providers:
  reject-drop:
    type: http
    behavior: classical
    format: text
    url: "https://ruleset.skk.moe/List/non_ip/reject-drop.conf"
    path: ./rule_providers/reject-drop.yaml
    interval: 86400

  reject:
    type: http
    behavior: classical
    format: text
    url: "https://ruleset.skk.moe/List/non_ip/reject.conf"
    path: ./rule_providers/reject.yaml
    interval: 86400

  reject-no-drop:
    type: http
    behavior: classical
    format: text
    url: "https://ruleset.skk.moe/List/non_ip/reject-no-drop.conf"
    path: ./rule_providers/reject-no-drop.yaml
    interval: 86400

  reject-ip:
    type: http
    behavior: classical
    format: text
    url: "https://ruleset.skk.moe/List/ip/reject.conf"
    path: ./rule_providers/reject-ip.yaml
    interval: 86400

  reject-domain:
    type: http
    behavior: domain
    format: text
    url: "https://ruleset.skk.moe/List/domainset/reject.conf"
    path: ./rule_providers/reject-domain.yaml
    interval: 86400

  reject-domain-extra:
    type: http
    behavior: domain
    format: text
    url: "https://ruleset.skk.moe/List/domainset/reject_extra.conf"
    path: ./rule_providers/reject-domain-extra.yaml
    interval: 86400

proxy-groups:
  - name: Manual
    type: select
    use:
      - Airport-A
      - Airport-B
    proxies:
      - DIRECT
      - REJECT

  - name: Auto
    type: url-test
    use:
      - Airport-A
      - Airport-B
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: HK
    type: url-test
    use:
      - Airport-A
      - Airport-B
    filter: "(?i)^(?!.*仅海外用户)(?!.*游戏).*(香港|HK|HongKong)"
    url: http://www.gstatic.com/generate_204
    interval: 300

  - name: TW
    type: url-test
    use:
      - Airport-A
      - Airport-B
    filter: "(?i)^(?!.*仅海外用户)(?!.*游戏).*(台湾|TW)"
    url: http://www.gstatic.com/generate_204
    interval: 300

  - name: SG
    type: url-test
    use:
      - Airport-A
      - Airport-B
    filter: "(?i)^(?!.*仅海外用户)(?!.*游戏).*(新加坡|SG|singapore)"
    url: http://www.gstatic.com/generate_204
    interval: 300

  - name: JP
    type: url-test
    use:
      - Airport-A
      - Airport-B
    filter: "(?i)^(?!.*仅海外用户)(?!.*游戏).*(日本|JP|Japan)"
    url: http://www.gstatic.com/generate_204
    interval: 300

  - name: US
    type: url-test
    use:
      - Airport-A
      - Airport-B
    filter: "(?i)^(?!.*仅海外用户)(?!.*游戏).*(美国|US)"
    url: http://www.gstatic.com/generate_204
    interval: 300

  - name: Google
    type: select
    proxies:
      - Manual
      - HK
      - TW
      - SG
      - JP
      - US
      - Auto
      - DIRECT

  - name: YouTube
    type: select
    proxies:
      - Manual
      - HK
      - TW
      - SG
      - JP
      - US
      - Auto
      - DIRECT

  - name: Netflix
    type: select
    proxies:
      - Manual
      - HK
      - TW
      - SG
      - JP
      - US
      - Auto
      - DIRECT

  - name: OpenAI
    type: select
    proxies:
      - US
      - Manual
      - JP
      - SG
      - Auto
      - DIRECT

  - name: Telegram
    type: select
    proxies:
      - Manual
      - HK
      - SG
      - Auto
      - DIRECT

  - name: Github
    type: select
    proxies:
      - Manual
      - HK
      - TW
      - SG
      - JP
      - US
      - Auto
      - DIRECT

  - name: Microsoft
    type: select
    proxies:
      - DIRECT
      - Manual
      - HK
      - TW
      - SG
      - JP
      - US
      - Auto

  - name: Apple
    type: select
    proxies:
      - DIRECT
      - Manual
      - HK
      - TW
      - SG
      - JP
      - US
      - Auto

  - name: TimeSync
    type: select
    proxies:
      - DIRECT
      - Manual
      - Auto

rules:
  # ========== SukkaW 广告拦截规则 ==========
  - RULE-SET,reject-domain,REJECT
  - RULE-SET,reject-domain-extra,REJECT
  - RULE-SET,reject-drop,REJECT
  - RULE-SET,reject,REJECT
  - RULE-SET,reject-no-drop,REJECT
  - RULE-SET,reject-ip,REJECT,no-resolve

  # ========== Time Sync ==========
  - DOMAIN-SUFFIX,time.nist.gov,TimeSync
  - DOMAIN-SUFFIX,pool.ntp.org,TimeSync
  - DOMAIN-SUFFIX,ntp.aliyun.com,TimeSync
  - DOMAIN-SUFFIX,time.apple.com,TimeSync
  - DOMAIN-SUFFIX,time.windows.com,TimeSync

  # ========== OpenAI ==========
  - DOMAIN-SUFFIX,ai.com,OpenAI
  - DOMAIN-SUFFIX,chatgpt.com,OpenAI
  - DOMAIN-SUFFIX,openai.com,OpenAI
  - DOMAIN-SUFFIX,auth0.com,OpenAI
  - DOMAIN-SUFFIX,claude.ai,OpenAI
  - DOMAIN-KEYWORD,openai,OpenAI

  # ========== Google ==========
  - DOMAIN-KEYWORD,google,Google
  - DOMAIN-SUFFIX,youtube.com,YouTube
  - DOMAIN-SUFFIX,ytimg.com,YouTube
  - DOMAIN-SUFFIX,googlevideo.com,YouTube

  # ========== Netflix ==========
  - DOMAIN-KEYWORD,netflix,Netflix
  - DOMAIN-SUFFIX,nflxvideo.net,Netflix
  - DOMAIN-SUFFIX,nflxso.net,Netflix

  # ========== Telegram ==========
  - DOMAIN-SUFFIX,telegram.org,Telegram
  - DOMAIN-SUFFIX,telegram.me,Telegram
  - DOMAIN-SUFFIX,t.me,Telegram
  - IP-CIDR,149.154.160.0/20,Telegram,no-resolve

  # ========== Github ==========
  - DOMAIN-SUFFIX,github.com,Github
  - DOMAIN-SUFFIX,githubusercontent.com,Github
  - DOMAIN-KEYWORD,github,Github

  # ========== Microsoft ==========
  - DOMAIN-KEYWORD,microsoft,Microsoft
  - DOMAIN-SUFFIX,msn.com,Microsoft
  - DOMAIN-SUFFIX,live.com,Microsoft
  - DOMAIN-SUFFIX,office.com,Microsoft

  # ========== Apple ==========
  - DOMAIN-SUFFIX,apple.com,Apple
  - DOMAIN-SUFFIX,icloud.com,Apple
  - DOMAIN-SUFFIX,me.com,Apple

  # ========== LAN ==========
  - IP-CIDR,127.0.0.0/8,DIRECT
  - IP-CIDR,172.16.0.0/12,DIRECT
  - IP-CIDR,192.168.0.0/16,DIRECT
  - IP-CIDR,10.0.0.0/8,DIRECT

  # ========== GEOIP ==========
  - GEOIP,CN,DIRECT
  - GEOIP,private,DIRECT,no-resolve

  # ========== Final ==========
  - MATCH,Manual
